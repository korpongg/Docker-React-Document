upstream backend_servers {
    # Define the backend server(s)
    # Adjust the port to match your Node.js application's port
    server app:3500; # Assuming `app` is the name of your Node.js service
}

server {
    listen 80;
    server_name localhost; # Use localhost or a specific domain name

    # Handle WebSocket connections for /broadcast
    location /broadcast {
        proxy_pass http://app:5000; # Direct to the WebSocket server
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /api/ requests to the backend API
    location /api/ {
        proxy_pass http://app:5000; # Adjust if your API is on a different port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default handling for all other requests
    location / {
        proxy_pass http://backend_servers; # Use the upstream defined above
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Define error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
